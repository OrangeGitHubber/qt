name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ./backend[dev]
      - run: pytest backend/tests -v

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm install
        working-directory: frontend
      - run: npm run build
        working-directory: frontend

  docker-image:
    needs: [backend-tests, frontend-build]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Compute build date
        id: builddate
        run: echo "date=$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
      # Build once and load locally so we can scan BEFORE publishing.
      - uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: qt-scan:candidate
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            GIT_SHA=${{ github.sha }}
            BUILD_DATE=${{ steps.builddate.outputs.date }}
          cache-to: type=gha,mode=max
          cache-from: type=gha
      - name: Scan image for fixable HIGH/CRITICAL vulnerabilities
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: qt-scan:candidate
          format: table
          exit-code: "1"            # fail the build on a finding
          severity: HIGH,CRITICAL
          ignore-unfixed: true      # only gate on vulns that HAVE a fix — base
                                    # images always carry unfixable OS CVEs, and
                                    # failing on those would block every publish
          trivyignores: .trivyignore  # allowlist escape hatch for the rest
      # Only reached if the scan passed. Reuses the buildx cache, so it's fast.
      - name: Publish image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            GIT_SHA=${{ github.sha }}
            BUILD_DATE=${{ steps.builddate.outputs.date }}
          cache-from: type=gha
